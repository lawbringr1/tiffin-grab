<!--
  TiffinGrab — logo lockup (Elementor → HTML widget in the first column of the header row).

  If the logo doesn’t show: on the logo column/container, Advanced → CSS classes → add: tg-nav-logo-col

  Logo: default URL is the live PNG in Media Library; swap to SVG after upload if preferred.
  Wordmark: Tiffin #fb801c · Grab #185936
-->
<a class="tg-nav-logo-mark" href="https://tiffingrab.ca/" aria-label="TiffinGrab — Home">
  <img
    class="tg-nav-logo-img"
    src="https://tiffingrab.ca/wp-content/uploads/2026/04/cropped-Tiffin-Grab-Transparent-1000x1000-1.png"
    width="44"
    height="44"
    alt=""
    decoding="async"
    loading="eager"
  />
  <span class="tg-nav-logo-wordmark">
    <span class="tg-brand-tiffin">Tiffin</span><span class="tg-brand-grab">Grab</span>
  </span>
</a>
