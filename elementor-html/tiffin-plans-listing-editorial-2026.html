<!--
  TiffinGrab — Tiffin Plans listing (Editorial Nourishment + live WooCommerce).
  Paste into an Elementor HTML widget on the draft “Tiffin plans (new design)” page.
  Omits site header/footer (theme supplies those).

  Data: WooCommerce Store API GET /wp-json/wc/store/v1/products
  Cart: same-origin POST to each product permalink (form.cart), including APO fields
        (Prefered Days, Number Of Tiffins, Start Date) when present — same as single product pages.

  Optional: set data-store-root on #tg-tplans-2026 if the widget is tested off-domain (defaults to location.origin).
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
<!-- Same Material Symbols URL as home-2026-hero-tags.html (variable wght/FILL). -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

<section id="tg-tplans-2026" class="tg-tplans" data-store-root="" data-tg-pricing-ui="stitch-weekly-total" aria-labelledby="tg-tplans-title">
  <style>
    .elementor-widget-html:has(#tg-tplans-2026),
    .elementor-widget-html:has(#tg-tplans-2026) .elementor-widget-container,
    .elementor-widget-html-custom:has(#tg-tplans-2026),
    .elementor-widget-html-custom:has(#tg-tplans-2026) .elementor-widget-container,
    .elementor-widget-wrap:has(#tg-tplans-2026),
    .elementor-column:has(#tg-tplans-2026),
    .elementor-column-wrap:has(#tg-tplans-2026),
    .elementor-section:has(#tg-tplans-2026),
    .e-con:has(#tg-tplans-2026),
    .e-con-inner:has(#tg-tplans-2026) {
      overflow: visible !important;
      max-width: none !important;
      background-color: #fef8f3 !important;
      background-image: none !important;
    }

    .tg-tplans {
      /* Brand orange (Home 2026 / site) — avoids rust + pink-tinted panels */
      --tp-primary: #f06b1a;
      --tp-primary-mid: #d3540f;
      --tp-on-primary: #ffffff;
      --tp-surface: #fef8f3;
      --tp-card: #ffffff;
      --tp-panel: #fff3e8;
      --tp-pricing-panel: #fdf0e8;
      --tp-surface-low: #f8f3ee;
      --tp-surface-highest: #e6e2dd;
      --tp-outline-variant: #e0c0b4;
      --tp-panel-2: #f7f2eb;
      --tp-on: #1d1b19;
      --tp-muted: #5c5854;
      --tp-ghost: rgba(29, 27, 25, 0.14);
      --tp-shadow: 0 24px 48px rgba(29, 27, 25, 0.06);
      --tp-orange-a12: rgba(240, 107, 26, 0.12);
      --tp-orange-a18: rgba(240, 107, 26, 0.18);
      --tp-orange-a22: rgba(240, 107, 26, 0.22);
      --tp-orange-a28: rgba(240, 107, 26, 0.28);
      --tp-orange-a35: rgba(240, 107, 26, 0.35);
      --tp-orange-a45: rgba(240, 107, 26, 0.45);
      --tp-orange-fill: rgba(240, 107, 26, 0.09);
      --tp-font-display: "Geist", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --tp-font-body: "Geist", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-family: var(--tp-font-body);
      color: var(--tp-on);
      background: var(--tp-surface);
      width: 100vw;
      max-width: none;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding: clamp(5rem, 10vw, 6.5rem) clamp(1.25rem, 4vw, 2rem) clamp(4rem, 8vw, 5.5rem);
      box-sizing: border-box;
    }
    @supports (width: 100dvw) {
      .tg-tplans {
        width: 100dvw;
        margin-left: calc(50% - 50dvw);
        margin-right: calc(50% - 50dvw);
      }
    }
    .tg-tplans * {
      box-sizing: border-box;
    }
    /* Geist for the whole section (Elementor kit often forces theme fonts on controls). */
    #tg-tplans-2026,
    #tg-tplans-2026 button,
    #tg-tplans-2026 input,
    #tg-tplans-2026 select,
    #tg-tplans-2026 textarea {
      font-family: var(--tp-font-body) !important;
    }
    .tg-tplans-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    /*
      Icons: match Home 2026 / FAQ widgets — use class "material-symbols-outlined" + !important.
      Elementor kit and body rules often set font-family: … !important on button/.elementor-widget,
      which breaks ligature icons if we only set font on a weak selector.
    */
    #tg-tplans-2026 .material-symbols-outlined,
    #tg-tplans-2026 .tg-tplans-icon {
      font-family: "Material Symbols Outlined" !important;
      font-weight: normal !important;
      font-style: normal !important;
      font-size: 1.25rem;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      vertical-align: middle;
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    #tg-tplans-2026 .tg-tplans-icon--fill {
      font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24 !important;
    }

    .tg-tplans-hero {
      text-align: center;
      margin-bottom: clamp(2.5rem, 5vw, 3.5rem);
    }
    .tg-tplans-hero h1#tg-tplans-title {
      font-family: var(--tp-font-display);
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: clamp(2.25rem, 4.5vw, 3rem);
      line-height: 1.1;
      margin: 0 0 1rem;
    }
    .tg-tplans-hero p {
      max-width: 36rem;
      margin: 0 auto;
      color: var(--tp-muted);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    .tg-tplans-filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: clamp(2rem, 4vw, 2.75rem);
    }
    .tg-tplans-filter {
      font-family: var(--tp-font-body);
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.65rem 1.15rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: var(--tp-card);
      color: var(--tp-on);
      cursor: pointer;
      box-shadow: var(--tp-shadow);
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .tg-tplans-filter:hover {
      transform: translateY(-1px);
    }
    .tg-tplans-filter[aria-pressed="true"] {
      background: linear-gradient(180deg, var(--tp-primary) 0%, var(--tp-primary-mid) 100%);
      color: var(--tp-on-primary);
      box-shadow: 0 12px 28px var(--tp-orange-a22);
    }

    .tg-tplans-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(1.5rem, 3vw, 2rem);
    }
    @media (min-width: 640px) {
      .tg-tplans-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 1024px) {
      .tg-tplans-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .tg-tplans-card {
      position: relative;
      min-height: 36.25rem;
      perspective: 1100px;
      -webkit-perspective: 1100px;
      background: transparent;
      box-shadow: none;
      border-radius: 16px;
    }
    .tg-tplans-flip {
      position: relative;
      width: 100%;
      min-height: 36.25rem;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.33, 1, 0.68, 1);
    }
    @media (prefers-reduced-motion: reduce) {
      .tg-tplans-flip {
        transition: none;
      }
    }
    .tg-tplans-card--flipped .tg-tplans-flip {
      transform: rotateY(180deg);
    }
    .tg-tplans-face {
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 36.25rem;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--tp-card);
      border-radius: 16px;
      box-shadow: var(--tp-shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tg-tplans-face--front {
      transform: rotateY(0deg) translateZ(1px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tg-tplans-face--back {
      transform: rotateY(180deg) translateZ(1px);
      overflow: hidden;
      padding: 1.25rem 1.5rem 1.35rem;
    }
    .tg-tplans-face--front .tg-tplans-media {
      flex-shrink: 0;
    }
    .tg-tplans-face--front .tg-tplans-body {
      flex: 1;
      min-height: 0;
    }
    .tg-tplans-back-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      margin-bottom: 1rem;
    }
    .tg-tplans-back-title {
      font-family: var(--tp-font-display);
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1.25;
    }
    .tg-tplans-media {
      position: relative;
      height: 14rem;
      background: var(--tp-panel-2);
      overflow: hidden;
    }
    .tg-tplans-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tg-tplans-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.625rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: var(--tp-primary);
      color: var(--tp-on-primary);
      font-family: var(--tp-font-display);
    }
    .tg-tplans-body {
      padding: 1.35rem 1.5rem 1.65rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 0.2rem;
    }
    .tg-tplans-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.65rem;
      margin-top: 0.15rem;
    }
    .tg-tplans-name {
      font-family: var(--tp-font-display);
      font-weight: 700;
      font-size: 1.125rem;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin: 0;
    }
    .tg-tplans-price {
      font-family: var(--tp-font-display);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--tp-primary);
      white-space: nowrap;
    }
    .tg-tplans-desc {
      font-size: 0.875rem;
      color: var(--tp-muted);
      line-height: 1.55;
      margin-bottom: 0.6rem;
      margin-top: 0.2rem;
    }
    .tg-tplans-read {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      border: none;
      background: none;
      padding: 0;
      font-family: var(--tp-font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--tp-primary);
      cursor: pointer;
      margin-bottom: 1.1rem;
    }
    .tg-tplans-read:hover {
      text-decoration: underline;
      color: var(--tp-primary-mid);
    }

    .tg-tplans-actions {
      margin-top: auto;
      padding-top: 1.35rem;
      background: linear-gradient(to top, var(--tp-card) 70%, transparent);
    }
    .tg-tplans-quick {
      width: 100%;
      padding: 0.95rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--tp-orange-a22);
      background: var(--tp-panel);
      color: var(--tp-primary);
      font-family: var(--tp-font-display);
      font-weight: 700;
      font-size: 0.9375rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }
    .tg-tplans-quick:hover {
      background: var(--tp-primary);
      color: var(--tp-on-primary);
      border-color: var(--tp-primary-mid);
      transform: scale(0.99);
    }
    .tg-tplans-quick:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .tg-tplans-face--back .tg-tplans-config {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
      min-height: 0;
      margin: 0;
      padding: 0;
      border: none;
      overflow: hidden;
    }

    .tg-tplans-label {
      display: block;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--tp-muted);
      margin-bottom: 0.4rem;
      margin-top: 0;
      font-family: var(--tp-font-body);
    }
    .tg-tplans-face--back .tg-tplans-label {
      font-size: 0.625rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
      color: var(--tp-muted);
    }
    .tg-tplans-seg {
      display: flex;
      gap: 0.5rem;
    }
    .tg-tplans-seg button {
      flex: 1;
      padding: 0.65rem 0.35rem;
      border-radius: 10px;
      font-family: var(--tp-font-display);
      font-weight: 700;
      font-size: 0.875rem;
      border: 2px solid transparent;
      background: var(--tp-surface-low);
      color: var(--tp-on);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .tg-tplans-seg button[aria-pressed="true"] {
      border-color: var(--tp-primary);
      background: var(--tp-pricing-panel);
      color: var(--tp-primary);
    }
    .tg-tplans-seg button:hover:not([aria-pressed="true"]) {
      background: #f2ede8;
      border-color: transparent;
    }

    .tg-tplans-days {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .tg-tplans-daybtn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      border-radius: 10px;
      border: 2px solid transparent;
      background: var(--tp-surface-low);
      font-size: 0.75rem;
      font-weight: 700;
      font-family: var(--tp-font-display);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .tg-tplans-daybtn:hover:not([aria-pressed="true"]) {
      background: #f2ede8;
    }
    .tg-tplans-daybtn[aria-pressed="true"] {
      border-color: var(--tp-primary);
      background: var(--tp-pricing-panel);
    }
    .tg-tplans-daybtn > span:first-of-type {
      color: var(--tp-muted);
    }
    .tg-tplans-daybtn[aria-pressed="true"] > span:first-of-type {
      color: var(--tp-on);
    }
    .tg-tplans-daybtn .tg-tplans-day-ring {
      display: inline-block;
      flex-shrink: 0;
      color: rgba(92, 88, 84, 0.22) !important;
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24 !important;
    }
    .tg-tplans-daybtn .tg-tplans-day-check {
      display: none;
      flex-shrink: 0;
      color: var(--tp-primary) !important;
    }
    .tg-tplans-daybtn[aria-pressed="true"] .tg-tplans-day-check {
      display: inline-block;
    }
    .tg-tplans-daybtn[aria-pressed="true"] .tg-tplans-day-ring {
      display: none;
    }

    .tg-tplans-select,
    .tg-tplans-date {
      width: 100%;
      padding: 0.52rem 2.1rem 0.52rem 0.8rem;
      border-radius: 12px;
      border: 1px solid var(--tp-ghost);
      background: var(--tp-panel-2);
      font-family: var(--tp-font-body);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--tp-on);
    }
    .tg-tplans-face--back .tg-tplans-date,
    .tg-tplans-face--back .tg-tplans-select {
      border: none;
      border-radius: 10px;
      background: var(--tp-surface-highest);
      padding: 0.75rem 2.25rem 0.75rem 0.85rem;
      font-weight: 700;
      font-size: 0.875rem;
    }
    .tg-tplans-select:focus,
    .tg-tplans-date:focus {
      outline: 2px solid var(--tp-orange-a35);
      outline-offset: 1px;
    }
    .tg-tplans-field-wrap {
      position: relative;
    }
    .tg-tplans-field-wrap .material-symbols-outlined,
    .tg-tplans-field-wrap .tg-tplans-icon {
      position: absolute;
      right: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--tp-muted);
    }

    /* Live pricing panel — matches Stitch code.html (pricing-panel + total row). */
    .tg-tplans-breakdown {
      flex-shrink: 0;
      margin-top: auto;
      padding: 1.25rem;
      border-radius: 12px;
      background: var(--tp-pricing-panel);
      box-shadow: none;
      border: none;
    }
    .tg-tplans-breakdown-rows {
      font-size: 0.75rem;
    }
    .tg-tplans-bd-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.65rem;
      line-height: 1.35;
    }
    .tg-tplans-bd-row:first-of-type {
      margin-bottom: 0.25rem;
    }
    .tg-tplans-bd-row:last-of-type {
      margin-bottom: 0.75rem;
    }
    .tg-tplans-bd-lbl {
      color: var(--tp-muted);
      font-weight: 500;
      font-size: 0.75rem;
      flex: 1;
      min-width: 0;
      padding-right: 0.35rem;
    }
    .tg-tplans-bd-val {
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--tp-on);
      white-space: nowrap;
    }
    .tg-tplans-bd-free {
      font-weight: 700;
      font-size: 0.875rem;
      color: #16a34a;
      white-space: nowrap;
    }
    .tg-tplans-bd-formula {
      font-size: 0.6875rem;
      line-height: 1.4;
      color: var(--tp-muted);
      opacity: 0.85;
      margin: 0 0 0.35rem;
    }
    .tg-tplans-breakdown-total {
      margin-top: 0;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(240, 107, 26, 0.1);
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
    }
    .tg-tplans-total-main {
      flex: 1;
      min-width: 0;
      text-align: left;
    }
    .tg-tplans-total-label {
      display: block;
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--tp-primary);
      margin-bottom: 0.125rem;
    }
    .tg-tplans-total-val {
      font-family: var(--tp-font-display);
      font-size: 1.875rem;
      font-weight: 800;
      color: var(--tp-on);
      letter-spacing: -0.025em;
      line-height: 1.1;
    }

    .tg-tplans-submit {
      flex-shrink: 0;
      width: auto;
      max-width: none;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-family: var(--tp-font-display);
      font-weight: 700;
      font-size: 0.875rem;
      line-height: 1.2;
      color: var(--tp-on-primary);
      background: var(--tp-primary);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(240, 107, 26, 0.2);
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .tg-tplans-submit:hover:not(:disabled) {
      filter: brightness(0.95);
      box-shadow: 0 12px 28px rgba(240, 107, 26, 0.28);
    }
    .tg-tplans-submit:active {
      transform: scale(0.98);
    }
    .tg-tplans-submit:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .tg-tplans-close {
      flex-shrink: 0;
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--tp-font-body);
      color: var(--tp-primary);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
      padding: 0.25rem 0;
      margin: 0;
      white-space: nowrap;
    }
    .tg-tplans-close:hover {
      text-decoration: underline;
      color: var(--tp-primary-mid);
    }

    .tg-tplans-config-inner {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .tg-tplans-options-slot {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .tg-tplans-pager {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.35rem;
      margin-top: clamp(2.5rem, 5vw, 3.5rem);
    }
    .tg-tplans-pagebtn {
      min-width: 2.5rem;
      height: 2.5rem;
      padding: 0 0.35rem;
      border-radius: 10px;
      border: 1px solid var(--tp-ghost);
      background: var(--tp-card);
      font-family: var(--tp-font-display);
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--tp-on);
      transition: background 0.2s, color 0.2s;
    }
    .tg-tplans-pagebtn:hover:not(:disabled) {
      background: var(--tp-panel-2);
    }
    .tg-tplans-pagebtn[aria-current="page"] {

  <div class="tg-tplans-inner">
    <header class="tg-tplans-hero">
      <h1 id="tg-tplans-title">Tiffin plans</h1>
      <p>
        Explore veg, non-veg, and healthy meal plans for Toronto and the GTA. Configure days, tiffin count, and start date here — same options as on each product page — then add to cart.
      </p>
    </header>

    <div class="tg-tplans-filters" role="group" aria-label="Filter plans">
      <button type="button" class="tg-tplans-filter" data-filter="all" aria-pressed="true">All</button>
      <button type="button" class="tg-tplans-filter" data-filter="veg" aria-pressed="false">Vegetarian</button>
      <button type="button" class="tg-tplans-filter" data-filter="nonveg" aria-pressed="false">Non vegetarian</button>
      <button type="button" class="tg-tplans-filter" data-filter="healthy" aria-pressed="false">Healthy meals</button>
    </div>

    <div id="tg-tplans-mount" class="tg-tplans-grid" aria-live="polite"></div>
    <nav id="tg-tplans-pager" class="tg-tplans-pager" aria-label="Pagination"></nav>
  </div>

  <div id="tg-tplans-toast" class="tg-tplans-toast" role="status"></div>

  <script>
    (function () {
      var root = document.getElementById("tg-tplans-2026");
      if (!root) return;

      var STORE = (root.getAttribute("data-store-root") || "").trim() || window.location.origin;
      var API = STORE + "/wp-json/wc/store/v1/products";
      var PER_PAGE = 9;
      var CAT = { all: null, veg: 15, nonveg: 30, healthy: 50 };

      var state = {
        filter: "all",
        page: 1,
        totalPages: 1,
        totalItems: 0,
        loading: false,
        allProducts: null,
        openId: null,
        schemaCache: {},
      };

      var mount = document.getElementById("tg-tplans-mount");
      var pager = document.getElementById("tg-tplans-pager");
      var toastEl = document.getElementById("tg-tplans-toast");

      function money(minor, currencyCode, symbol) {
        var n = (parseInt(minor, 10) || 0) / 100;
        try {
          return new Intl.NumberFormat("en-CA", { style: "currency", currency: currencyCode || "CAD" }).format(n);
        } catch (e) {
          return (symbol || "$") + n.toFixed(2);
        }
      }

      function stripHtml(html) {
        var d = document.createElement("div");
        d.innerHTML = html || "";
        return (d.textContent || "").replace(/\s+/g, " ").trim();
      }

      function excerptFromProduct(p) {
        var t = stripHtml(p.short_description);
        if (!t) t = stripHtml(p.description);
        return t;
      }

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add("tg-tplans-toast--show");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () {
          toastEl.classList.remove("tg-tplans-toast--show");
        }, 4200);
      }

      function parseCartForm(html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        var form = doc.querySelector("form.cart");
        if (!form) return { error: "No cart form on product page." };
        var addBtn = form.querySelector('[name="add-to-cart"]');
        var productId = addBtn ? addBtn.value : null;
        if (!productId) return { error: "Missing product id." };
        var action = form.getAttribute("action") || "";
        var apo = [];
        form.querySelectorAll("select[name^='apo_'], input[name^='apo_']").forEach(function (el) {
          var name = el.getAttribute("name");
          var labelEl = el.closest(".apo-option");
          var labelText = "";
          if (labelEl) {
            var lb = labelEl.querySelector("label");
            if (lb) {
              labelText = (lb.textContent || "").replace(/\*/g, "").trim();
            }
          }
          var entry = { name: name, label: labelText || name, required: el.required, tag: el.tagName.toLowerCase() };
          if (entry.tag === "select") {
            entry.options = [];
            el.querySelectorAll("option").forEach(function (opt) {
              var v = opt.getAttribute("value");
              if (v === "" || v === null) return;
              entry.options.push({ value: v, text: (opt.textContent || "").trim() });
            });
          }
          apo.push(entry);
        });
        return { productId: productId, action: action, apo: apo };
      }

      var schemaFetchInflight = {};

      async function fetchSchema(permalink) {
        if (state.schemaCache[permalink]) return state.schemaCache[permalink];
        if (schemaFetchInflight[permalink]) return schemaFetchInflight[permalink];
        schemaFetchInflight[permalink] = (async function () {
          try {
            var res = await fetch(permalink, { credentials: "same-origin" });
            var html = await res.text();
            var parsed = parseCartForm(html);
            state.schemaCache[permalink] = parsed;
            return parsed;
          } finally {
            delete schemaFetchInflight[permalink];
          }
        })();
        return schemaFetchInflight[permalink];
      }

      /** Warm cache for visible cards so “Customize & subscribe” often hits cache (no full-page fetch on click). */
      function prefetchSchemasForProducts(products) {
        var q = [];
        products.forEach(function (p) {
          if (p && p.permalink && !state.schemaCache[p.permalink]) q.push(p);
        });
        if (!q.length) return;
        function worker() {
          var p = q.shift();
          if (!p) return;
          fetchSchema(p.permalink)
            .catch(function () {})
            .finally(function () {
              if (!q.length) return;
              if (typeof requestIdleCallback === "function") {
                requestIdleCallback(worker, { timeout: 1200 });
              } else {
                setTimeout(worker, 50);
              }
            });
        }
        function start() {
          var n = Math.min(3, q.length);
          for (var i = 0; i < n; i++) worker();
        }
        if (typeof requestIdleCallback === "function") {
          requestIdleCallback(start, { timeout: 2000 });
        } else {
          setTimeout(start, 120);
        }
      }

      async function addToCart(schema, fieldValues, quantity) {
        try {
          var fd = new FormData();
          fd.append("quantity", String(quantity || 1));
          fd.append("add-to-cart", schema.productId);
          schema.apo.forEach(function (f) {
            var v = fieldValues[f.name];
            if (v != null && v !== "") fd.append(f.name, v);
          });
          var res = await fetch(schema.action, {
            method: "POST",
            body: fd,
            credentials: "same-origin",
            redirect: "manual",
          });
          var text = await res.text();
          var doc = new DOMParser().parseFromString(text, "text/html");
          /* Do not use string search: stylesheets contain “.woocommerce-error” and falsely trigger errors. */
          var errLis = doc.querySelectorAll("ul.woocommerce-error li");
          if (errLis && errLis.length) {
            var parts = [];
            errLis.forEach(function (li) {
              var t = (li.textContent || "").trim();
              if (t) parts.push(t);
            });
            return { ok: false, message: parts.length ? parts.join(" ") : "Could not add to cart." };
          }
          var okEl = doc.querySelector(".woocommerce-message");
          if (okEl) {
            var mt = (okEl.textContent || "").replace(/\s+/g, " ").trim();
            return { ok: true, message: mt || "Added to cart." };
          }
          if (res.status === 302 || (res.ok && res.status < 400)) {
            return { ok: true, message: "Added to cart." };
          }
          return { ok: false, message: "Unexpected response from server." };
        } catch (e) {
          return { ok: false, message: (e && e.message) || "Could not reach the server." };
        }
      }

      function setFiltersUI() {
        root.querySelectorAll(".tg-tplans-filter").forEach(function (btn) {
          btn.setAttribute("aria-pressed", btn.getAttribute("data-filter") === state.filter ? "true" : "false");
        });
      }

      async function loadProducts() {
        state.loading = true;
        mount.innerHTML = '<p class="tg-tplans-status">Loading plans…</p>';
        pager.innerHTML = "";

        try {
          if (state.filter === "all") {
            if (!state.allProducts) {
              var r = await fetch(API + "?per_page=100", { credentials: "same-origin" });
              if (!r.ok) throw new Error("Could not load products.");
              state.allProducts = await r.json();
            }
            state.totalItems = state.allProducts.length;
            state.totalPages = Math.max(1, Math.ceil(state.totalItems / PER_PAGE));
            if (state.page > state.totalPages) state.page = state.totalPages;
            var start = (state.page - 1) * PER_PAGE;
            var slice = state.allProducts.slice(start, start + PER_PAGE);
            renderCards(slice);
            prefetchSchemasForProducts(slice);
          } else {
            var cat = CAT[state.filter];
            var url = API + "?per_page=" + PER_PAGE + "&page=" + state.page + "&category=" + cat;
            var res = await fetch(url, { credentials: "same-origin" });
            if (!res.ok) throw new Error("Could not load products.");
            var data = await res.json();
            var total = parseInt(res.headers.get("X-WP-Total") || "0", 10);
            var pages = parseInt(res.headers.get("X-WP-TotalPages") || "1", 10);
            state.totalItems = total;
            state.totalPages = Math.max(1, pages);
            renderCards(data);
            prefetchSchemasForProducts(data);
          }
        } catch (e) {
          mount.innerHTML =
            '<p class="tg-tplans-status tg-tplans-status--err">' +
            (e.message || "Something went wrong.") +
            "</p>";
        } finally {
          state.loading = false;
        }
        renderPager();
      }

      function renderPager() {
        pager.innerHTML = "";
        if (state.totalPages <= 1) return;

        function goToPage(num) {
          state.page = num;
          state.openId = null;
          loadProducts();
          root.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        var prev = document.createElement("button");
        prev.type = "button";
        prev.className = "tg-tplans-pagebtn";
        prev.setAttribute("aria-label", "Previous page");
        prev.innerHTML =
          '<span class="material-symbols-outlined tg-tplans-icon" aria-hidden="true">chevron_left</span>';
        prev.disabled = state.page <= 1;
        prev.addEventListener("click", function () {
          if (state.page > 1) goToPage(state.page - 1);
        });
        pager.appendChild(prev);

        var total = state.totalPages;
        var cur = state.page;
        var pagesToShow = [];
        if (total <= 9) {
          for (var i = 1; i <= total; i++) pagesToShow.push(i);
        } else {
          pagesToShow.push(1);
          var start = Math.max(2, cur - 1);
          var end = Math.min(total - 1, cur + 1);
          if (start > 2) pagesToShow.push(-1);
          for (var j = start; j <= end; j++) pagesToShow.push(j);
          if (end < total - 1) pagesToShow.push(-1);
          pagesToShow.push(total);
        }

        var lastAdded = null;
        pagesToShow.forEach(function (num) {
          if (num === -1) {
            var ell = document.createElement("span");
            ell.textContent = "…";
            ell.style.opacity = "0.45";
            ell.style.padding = "0 0.25rem";
            ell.style.alignSelf = "center";
            pager.appendChild(ell);
            lastAdded = null;
            return;
          }
          if (lastAdded === num) return;
          lastAdded = num;
          var b = document.createElement("button");
          b.type = "button";
          b.className = "tg-tplans-pagebtn";
          b.textContent = String(num);
          if (num === cur) b.setAttribute("aria-current", "page");
          b.addEventListener("click", function () {
            goToPage(num);
          });
          pager.appendChild(b);
        });

        var next = document.createElement("button");
        next.type = "button";
        next.className = "tg-tplans-pagebtn";
        next.setAttribute("aria-label", "Next page");
        next.innerHTML =
          '<span class="material-symbols-outlined tg-tplans-icon" aria-hidden="true">chevron_right</span>';
        next.disabled = state.page >= state.totalPages;
        next.addEventListener("click", function () {
          if (state.page < state.totalPages) goToPage(state.page + 1);
        });
        pager.appendChild(next);
      }

      function syncFlipA11y(card) {
        var flipped = card.classList.contains("tg-tplans-card--flipped");
        var front = card.querySelector(".tg-tplans-face--front");
        var back = card.querySelector(".tg-tplans-face--back");
        card.setAttribute("aria-expanded", flipped ? "true" : "false");
        if (front) {
          front.setAttribute("aria-hidden", flipped ? "true" : "false");
          if ("inert" in front) front.inert = flipped;
        }
        if (back) {
          back.setAttribute("aria-hidden", flipped ? "false" : "true");
          if ("inert" in back) back.inert = !flipped;
        }
      }

      function renderCards(products) {
        mount.innerHTML = "";
        if (!products.length) {
          mount.innerHTML = '<p class="tg-tplans-status">No plans in this filter.</p>';
          return;
        }

        products.forEach(function (p, idx) {
          var card = document.createElement("article");
          card.className = "tg-tplans-card";
          card.dataset.productId = String(p.id);
          card.setAttribute("aria-expanded", "false");

          var flip = document.createElement("div");
          flip.className = "tg-tplans-flip";

          var faceFront = document.createElement("div");
          faceFront.className = "tg-tplans-face tg-tplans-face--front";

          var faceBack = document.createElement("div");
          faceBack.className = "tg-tplans-face tg-tplans-face--back";

          var imgUrl = p.images && p.images[0] ? p.images[0].src : "";
          var alt = (p.images && p.images[0] && p.images[0].alt) || p.name;

          var media = document.createElement("div");
          media.className = "tg-tplans-media";
          if (idx === 0 && state.page === 1) {
            var badge = document.createElement("span");
            badge.className = "tg-tplans-badge";
            badge.textContent = "Popular";
            media.appendChild(badge);
          }
          if (imgUrl) {
            var im = document.createElement("img");
            im.src = imgUrl;
            im.alt = alt;
            im.loading = "lazy";
            media.appendChild(im);
          } else {
            var ph = document.createElement("span");
            ph.className = "material-symbols-outlined tg-tplans-icon";
            ph.style.fontSize = "3rem";
            ph.style.position = "absolute";
            ph.style.left = "50%";
            ph.style.top = "50%";
            ph.style.transform = "translate(-50%,-50%)";
            ph.style.color = "rgba(29,27,25,0.2)";
            ph.textContent = "restaurant";
            media.appendChild(ph);
          }

          var body = document.createElement("div");
          body.className = "tg-tplans-body";

          var row = document.createElement("div");
          row.className = "tg-tplans-row";
          var h = document.createElement("h2");
          h.className = "tg-tplans-name";
          h.textContent = p.name;
          var price = document.createElement("span");
          price.className = "tg-tplans-price";
          price.textContent = money(p.prices.price, p.prices.currency_code, p.prices.currency_symbol);
          row.appendChild(h);
          row.appendChild(price);

          var fullDesc = excerptFromProduct(p);
          var shortLen = 110;
          var short = fullDesc.length > shortLen ? fullDesc.slice(0, shortLen).trim() + "…" : fullDesc;

          var desc = document.createElement("div");
          desc.className = "tg-tplans-desc";
          var spanShort = document.createElement("span");
          spanShort.className = "tg-tplans-snippet";
          spanShort.textContent = short;
          var spanFull = document.createElement("span");
          spanFull.className = "tg-tplans-full";
          spanFull.hidden = true;
          spanFull.textContent = fullDesc;
          desc.appendChild(spanShort);
          desc.appendChild(spanFull);

          var readBtn = document.createElement("button");
          readBtn.type = "button";
          readBtn.className = "tg-tplans-read";
          readBtn.setAttribute("data-open", "0");
          readBtn.innerHTML =
            '<span class="tg-tplans-read-label">Read more</span><span class="material-symbols-outlined tg-tplans-icon" aria-hidden="true">expand_more</span>';
          readBtn.addEventListener("click", function () {
            var open = readBtn.getAttribute("data-open") === "1";
            spanShort.hidden = !open;
            spanFull.hidden = open;
            readBtn.querySelector(".tg-tplans-read-label").textContent = open ? "Read more" : "Show less";
            readBtn.setAttribute("data-open", open ? "0" : "1");
          });

          var actions = document.createElement("div");
          actions.className = "tg-tplans-actions";
          var qw = document.createElement("div");
          qw.className = "tg-tplans-quick-wrap";
          var quick = document.createElement("button");
          quick.type = "button";
          quick.className = "tg-tplans-quick";
          quick.textContent = "Customize & subscribe";
          quick.addEventListener("click", function () {
            if (state.openId && state.openId !== card) {
              state.openId.classList.remove("tg-tplans-card--flipped");
              syncFlipA11y(state.openId);
            }
            card.classList.add("tg-tplans-card--flipped");
            state.openId = card;
            syncFlipA11y(card);
            populateConfig(card, p);
          });
          qw.appendChild(quick);
          actions.appendChild(qw);

          body.appendChild(row);
          body.appendChild(desc);
          body.appendChild(readBtn);
          body.appendChild(actions);

          faceFront.appendChild(media);
          faceFront.appendChild(body);

          var backHeader = document.createElement("div");
          backHeader.className = "tg-tplans-back-header";
          var backTitle = document.createElement("h2");
          backTitle.className = "tg-tplans-back-title";
          backTitle.textContent = "Configure your plan";
          var closeBtn = document.createElement("button");
          closeBtn.type = "button";
          closeBtn.className = "tg-tplans-close";
          closeBtn.textContent = "Back to description";
          closeBtn.addEventListener("click", function () {
            card.classList.remove("tg-tplans-card--flipped");
            if (state.openId === card) state.openId = null;
            syncFlipA11y(card);
          });
          backHeader.appendChild(backTitle);
          backHeader.appendChild(closeBtn);

          var config = document.createElement("div");
          config.className = "tg-tplans-config";
          config.dataset.permalink = p.permalink;
          config.dataset.priceMinor = p.prices.price;
          config.dataset.currency = p.prices.currency_code || "CAD";
          config.dataset.symbol = p.prices.currency_symbol || "$";

          var configMount = document.createElement("div");
          configMount.className = "tg-tplans-config-inner";
          config.appendChild(configMount);

          faceBack.appendChild(backHeader);
          faceBack.appendChild(config);

          flip.appendChild(faceFront);
          flip.appendChild(faceBack);
          card.appendChild(flip);
          mount.appendChild(card);

          syncFlipA11y(card);
        });
      }

      function labelKey(txt) {
        var t = (txt || "").toLowerCase();
        if (t.indexOf("tiffin") !== -1) return "tiffins";
        if (/\bmeals?\b/.test(t)) return "tiffins";
        if (t.indexOf("day") !== -1) return "days";
        if (/\b(qty|quantity)\b/.test(t)) return "tiffins";
        if (t.indexOf("date") !== -1) return "date";
        return "other";
      }

      /** How many tiffins/meals the selected APO option represents (Woo values may be slugs or labels). */
      function tiffinCountFromField(field, rawValue) {
        if (!field) return 1;
        if (rawValue === undefined || rawValue === "") return 1;
        var s = String(rawValue).trim();
        var n = parseInt(s, 10);
        if (!isNaN(n) && n > 0) return n;
        var lead = s.match(/^(\d+)/);
        if (lead) {
          var ln = parseInt(lead[1], 10);
          if (!isNaN(ln) && ln > 0) return ln;
        }
        if (!field.options || !field.options.length) return 1;
        var j;
        for (j = 0; j < field.options.length; j++) {
          if (String(field.options[j].value) !== s) continue;
          var tx = String(field.options[j].text || "");
          var m = tx.match(/(\d+)/);
          if (m) {
            var mn = parseInt(m[1], 10);
            if (!isNaN(mn) && mn > 0) return mn;
          }
          return 1;
        }
        return 1;
      }

      /** Prefer Woo option value 1 when present; else smallest numeric; else first. */
      function defaultTiffinOptionIndex(options) {
        if (!options || !options.length) return 0;
        var k;
        for (k = 0; k < options.length; k++) {
          var v = String(options[k].value).trim();
          if (v === "1" || parseInt(v, 10) === 1) return k;
        }
        var minIdx = 0;
        var minVal = Infinity;
        for (k = 0; k < options.length; k++) {
          var n = parseInt(String(options[k].value).trim(), 10);
          if (!isNaN(n) && n < minVal) {
            minVal = n;
            minIdx = k;
          }
        }
        return minVal !== Infinity ? minIdx : 0;
      }

      function populateConfig(card, product) {
        var inner = card.querySelector(".tg-tplans-config-inner");
        var cfgEl = card.querySelector(".tg-tplans-config");
        var perMeal = parseInt(cfgEl.dataset.priceMinor, 10) || 0;
        var curCode = cfgEl.dataset.currency || "CAD";
        var curSym = cfgEl.dataset.symbol || "$";

        inner.innerHTML = "";

        var optionsSlot = document.createElement("div");
        optionsSlot.className = "tg-tplans-options-slot";
        var loadingMsg = document.createElement("p");
        loadingMsg.className = "tg-tplans-options-loading";
        loadingMsg.textContent = "Loading meal options…";
        optionsSlot.appendChild(loadingMsg);
        inner.appendChild(optionsSlot);

        var breakdown = document.createElement("div");
        breakdown.className = "tg-tplans-breakdown";
        breakdown.innerHTML =
          '<div class="tg-tplans-breakdown-rows"></div>' +
          '<div class="tg-tplans-breakdown-total">' +
          '<div class="tg-tplans-total-main">' +
          '<span class="tg-tplans-total-label">Total Weekly</span>' +
          '<div class="tg-tplans-total-val">…</div>' +
          "</div>" +
          "</div>";
        var totalRow = breakdown.querySelector(".tg-tplans-breakdown-total");
        var submit = document.createElement("button");
        submit.type = "button";
        submit.className = "tg-tplans-submit";
        submit.textContent = "Add to Cart";
        submit.disabled = true;
        totalRow.appendChild(submit);
        inner.appendChild(breakdown);

        var values = {};
        var schemaRef = { current: null };

        function paintBreakdownPartial() {
          var rows = breakdown.querySelector(".tg-tplans-breakdown-rows");
          var totalVal = breakdown.querySelector(".tg-tplans-total-val");
          rows.innerHTML =
            '<div class="tg-tplans-bd-row"><span class="tg-tplans-bd-lbl">Weekly Subtotal</span><span class="tg-tplans-bd-val" style="opacity:0.45">…</span></div>' +
            '<div class="tg-tplans-bd-row"><span class="tg-tplans-bd-lbl">Delivery Fee</span><span class="tg-tplans-bd-free">FREE</span></div>';
          totalVal.textContent = "…";
          totalVal.style.opacity = "0.4";
        }

        function updateBreakdown() {
          var sch = schemaRef.current;
          var rows = breakdown.querySelector(".tg-tplans-breakdown-rows");
          var totalVal = breakdown.querySelector(".tg-tplans-total-val");
          var tiffins = 1;
          if (sch && sch.apo) {
            sch.apo.forEach(function (f) {
              if (labelKey(f.label) === "tiffins") {
                tiffins = tiffinCountFromField(f, values[f.name]);
              }
            });
          }
          /* Weekly total = listed meal price × number of tiffins only (preferred days = delivery schedule, not price). */
          var totalMinor = Math.round(perMeal * tiffins);
          var subFormatted = money(String(totalMinor), curCode, curSym);
          var perStr = money(String(perMeal), curCode, curSym);
          var formula = perStr + " per meal × " + tiffins + " tiffins";
          rows.innerHTML =
            '<p class="tg-tplans-bd-formula">' +
            escapeHtml(formula) +
            "</p>" +
            '<div class="tg-tplans-bd-row"><span class="tg-tplans-bd-lbl">Weekly Subtotal</span><span class="tg-tplans-bd-val">' +
            subFormatted +
            "</span></div>" +
            '<div class="tg-tplans-bd-row"><span class="tg-tplans-bd-lbl">Delivery Fee</span><span class="tg-tplans-bd-free">FREE</span></div>';
          totalVal.textContent = subFormatted;
          totalVal.style.opacity = "1";
        }

        paintBreakdownPartial();

        function applySchema(schema) {
          optionsSlot.innerHTML = "";
          schemaRef.current = schema;

          if (schema.error) {
            optionsSlot.innerHTML =
              '<p class="tg-tplans-status tg-tplans-status--err">' +
              escapeHtml(schema.error) +
              '</p><p class="tg-tplans-status"><a href="' +
              product.permalink +
              '">Open product page</a></p>';
            submit.disabled = true;
            return;
          }

          schema.apo.forEach(function (field) {
            var key = labelKey(field.label);
            var wrap = document.createElement("div");

            if (field.tag === "select" && field.options && field.options.length) {
              if (key === "tiffins") {
                wrap.innerHTML = '<span class="tg-tplans-label">Number of tiffins</span><div class="tg-tplans-seg"></div>';
                var seg = wrap.querySelector(".tg-tplans-seg");
                var tix = defaultTiffinOptionIndex(field.options);
                field.options.forEach(function (opt, i) {
                  var b = document.createElement("button");
                  b.type = "button";
                  b.textContent = opt.value;
                  b.setAttribute("aria-pressed", i === tix ? "true" : "false");
                  b.addEventListener("click", function () {
                    seg.querySelectorAll("button").forEach(function (x) {
                      x.setAttribute("aria-pressed", "false");
                    });
                    b.setAttribute("aria-pressed", "true");
                    values[field.name] = opt.value;
                    updateBreakdown();
                  });
                  seg.appendChild(b);
                });
                values[field.name] = field.options[tix].value;
              } else if (key === "days") {
                wrap.innerHTML = '<span class="tg-tplans-label">Preferred days</span><div class="tg-tplans-days"></div>';
                var grid = wrap.querySelector(".tg-tplans-days");
                field.options.forEach(function (opt, i) {
                  var b = document.createElement("button");
                  b.type = "button";
                  b.className = "tg-tplans-daybtn";
                  b.setAttribute("aria-pressed", i === 0 ? "true" : "false");
                  b.innerHTML =
                    "<span>" +
                    opt.text.replace(/Monday/g, "Mon").replace(/Tuesday/g, "Tue").replace(/Wednesday/g, "Wed").replace(/Thursday/g, "Thu").replace(/Friday/g, "Fri").replace(/Saturday/g, "Sat").replace(/Sunday/g, "Sun") +
                    '</span><span class="material-symbols-outlined tg-tplans-icon tg-tplans-icon--fill tg-tplans-day-check" aria-hidden="true">check_circle</span>' +
                    '<span class="material-symbols-outlined tg-tplans-icon tg-tplans-day-ring" aria-hidden="true">radio_button_unchecked</span>';
                  b.addEventListener("click", function () {
                    grid.querySelectorAll(".tg-tplans-daybtn").forEach(function (x) {
                      x.setAttribute("aria-pressed", "false");
                    });
                    b.setAttribute("aria-pressed", "true");
                    values[field.name] = opt.value;
                    updateBreakdown();
                  });
                  grid.appendChild(b);
                });
                values[field.name] = field.options[0].value;
              } else {
                wrap.innerHTML = '<span class="tg-tplans-label">' + escapeHtml(field.label) + "</span>";
                var fw = document.createElement("div");
                fw.className = "tg-tplans-field-wrap";
                var sel = document.createElement("select");
                sel.className = "tg-tplans-select";
                sel.required = field.required;
                field.options.forEach(function (opt) {
                  var o = document.createElement("option");
                  o.value = opt.value;
                  o.textContent = opt.text;
                  sel.appendChild(o);
                });
                sel.addEventListener("change", function () {
                  values[field.name] = sel.value;
                  updateBreakdown();
                });
                values[field.name] = field.options[0].value;
                fw.appendChild(sel);
                var ic = document.createElement("span");
                ic.className = "material-symbols-outlined tg-tplans-icon";
                ic.textContent = "keyboard_arrow_down";
                fw.appendChild(ic);
                wrap.appendChild(fw);
              }
            } else {
              wrap.innerHTML = '<span class="tg-tplans-label">' + escapeHtml(field.label) + "</span>";
              var inp = document.createElement("input");
              inp.className = "tg-tplans-date";
              inp.type = "date";
              inp.required = !!field.required;
              inp.addEventListener("change", function () {
                values[field.name] = inp.value;
              });
              wrap.appendChild(inp);
            }
            optionsSlot.appendChild(wrap);
          });

          submit.disabled = false;
          submit.onclick = function () {
            var sch = schemaRef.current;
            if (!sch || sch.error) return;
            for (var i = 0; i < sch.apo.length; i++) {
              var f = sch.apo[i];
              if (f.required && (values[f.name] === undefined || values[f.name] === "")) {
                showToast("Please complete: " + (f.label || f.name));
                return;
              }
            }
            submit.disabled = true;
            addToCart(sch, values, 1)
              .then(function (r) {
                submit.disabled = false;
                if (r.ok) {
                  showToast(r.message);
                  card.classList.remove("tg-tplans-card--flipped");
                  if (state.openId === card) state.openId = null;
                  syncFlipA11y(card);
                  if (window.jQuery) {
                    window.jQuery(document.body).trigger("added_to_cart");
                  }
                } else {
                  showToast(r.message);
                }
              })
              .catch(function () {
                submit.disabled = false;
                showToast("Could not reach the server.");
              });
          };

          updateBreakdown();
        }

        var cached = state.schemaCache[product.permalink];
        if (cached) {
          applySchema(cached);
        } else {
          fetchSchema(product.permalink).then(applySchema);
        }
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      root.querySelectorAll(".tg-tplans-filter").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.filter = btn.getAttribute("data-filter") || "all";
          state.page = 1;
          state.openId = null;
          setFiltersUI();
          loadProducts();
        });
      });

      setFiltersUI();
      loadProducts();
    })();
  </script>
</section>
