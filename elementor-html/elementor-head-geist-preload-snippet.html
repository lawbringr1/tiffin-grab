<!--
  TiffinGrab — paste into site <head> via a FREE plugin (Insert Headers and Footers, WPCode, etc.).
  Elementor Free has no Custom Code; Site Settings → Custom CSS cannot output <link> tags.

  Why the “half-loaded / system font / plain buttons” look on slow networks:
  • HTML paints before webfonts + all CSS finish (FOUT / FOUC).
  • Geist loaded only from Custom CSS @import is LATE vs <head> links.
  • Speed plugins (LiteSpeed, WP Rocket, Autoptimize) that “defer CSS” or “delay JS” make this worse.
    LiteSpeed: turn OFF “Load CSS Asynchronously”; set “Font Display Optimization” to Default (Swap
    overwrites your Geist optional + loads Google Fonts async — half-styled flash).
  • Brave Shields (or strict blockers) can delay third-party fonts (fonts.googleapis.com / gstatic).

  Fix stack:
  1) Paste this snippet in the HEADER (high priority).
  2) In Site Settings → Custom CSS: if this snippet is in <head>, you may REMOVE both @import lines
     (Geist + Material Symbols) and keep only html body { … } + .material-symbols-outlined { … }
     so fonts aren’t declared twice. If you skip this snippet, keep both @imports in Custom CSS.
  3) In your optimizer: do NOT defer Elementor/theme CSS sitewide; exclude /elementor/, post-*.css, hello-*.css.
  4) Test with Brave Shields down for tiffingrab.ca if fonts still stall.

  If icon names show as text (e.g. workspace_premium): Material Symbols font never applied — load it
  here too (below), not only via Custom CSS @import (LiteSpeed async CSS often delays that).

  If Google changes URLs, refresh woff2 hrefs from @font-face in the Google CSS URLs (Chrome desktop UA).

  Variable font (Google Fonts): Geist is served as one variable face on the wght axis (100–900). The CSS API URL
  uses family=Geist:wght@100..900 — any font-weight you set (400, 600, 700, …) comes from that single file; you
  do not need a utility class like .geist-* unless your framework generates one. In WP/Elementor, kit CSS
  font-family: "Geist", … + font-weight is enough.

  display: Google’s docs often use display=swap. We use display=optional here to reduce visible FOUT on slow
  networks (text may stay fallback briefly then swap once). To match Google’s default exactly, change the Geist
  link below to display=swap (and keep LiteSpeed “Font Display” compatible with your choice).

  Lighthouse “Render blocking requests” (fonts.googleapis.com CSS): plain rel=stylesheet blocks first paint.
  Below we load those CSS files as non-blocking via media="print" + onload="this.media='all'" (classic pattern).
  Preconnect + woff2 preloads still warm the connection and font files. Re-run Lighthouse after pasting.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- Non-blocking Google Fonts CSS (avoids render-blocking stylesheet; noscript fallback for no-JS) -->
<!-- Geist variable font: wght 100–900 -->
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=optional"
  media="print"
  onload="this.media='all'"
/>
<noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=optional" />
</noscript>
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
  media="print"
  onload="this.media='all'"
/>
<noscript>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
  />
</noscript>
<link
  rel="preload"
  as="font"
  type="font/woff2"
  crossorigin
  fetchpriority="high"
  href="https://fonts.gstatic.com/s/geist/v4/gyByhwUxId8gMEwcGFWNOITd.woff2"
/>
<link
  rel="preload"
  as="font"
  type="font/woff2"
  crossorigin
  href="https://fonts.gstatic.com/s/geist/v4/gyByhwUxId8gMEwSGFWNOITddY4.woff2"
/>
<link
  rel="preload"
  as="font"
  type="font/woff2"
  crossorigin
  href="https://fonts.gstatic.com/s/materialsymbolsoutlined/v325/kJEPBvYX7BgnkSrUwT8OhrdQw4oELdPIeeII9v6oDMzBwG-RpA6RzaxHMPdY40KH8nGzv3fzfVJO1USv9ls.woff2"
/>
